{% extends "base.html" %}
{% block title %}Регистрация — Omnify Store{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h2 class="auth-title">Регистрация</h2>
    <p class="auth-sub">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>

    <form method="POST" action="{{ url_for('register') }}" novalidate>

      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="username" placeholder="username" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="email@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="Минимум 6 символов" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Подтверждение пароля</label>
        <input type="password" name="confirm" placeholder="Повторите пароль" autocomplete="new-password">
      </div>

      <button type="submit" class="auth-btn">Создать аккаунт</button>
    </form>
  </div>
</div>
{% endblock %}
