{% extends "base.html" %}
{% block title %}Вход — Omnify Store{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h2 class="auth-title">Вход</h2>
    <p class="auth-sub">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>

    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <input type="hidden" name="next" value="{{ next }}">

      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="username" placeholder="username" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button type="submit" class="auth-btn">Войти</button>
    </form>

    <div class="auth-footer mt-3" style="border-top:1px solid var(--border);padding-top:14px;">
      <span style="font-size:10px;color:var(--text-dim);">Демо-аккаунт:</span>
      <br>
      <span style="color:var(--text-dim);">admin / admin123</span>
    </div>
  </div>
</div>
{% endblock %}
